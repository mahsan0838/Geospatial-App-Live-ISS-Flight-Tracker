apiVersion: apps/v1
kind: Deployment
metadata:
  name: iss-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iss-backend
  template:
    metadata:
      labels:
        app: iss-backend
    spec:
      containers:
      - name: backend
        image: 22i0838/iss-backend:c183d846f09da60b08840cb171c1d915ed663542
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: LoadBalancer
  selector:
    app: iss-backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 8000