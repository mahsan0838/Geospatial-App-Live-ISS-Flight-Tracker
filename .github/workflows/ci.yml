name: CI/CD Pipeline

on:
  push:
    branches:
      - main # Change to 'master' if your default branch is master

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./iss-tracker/backend
          push: true
          tags: 22i0838/iss-backend:${{ github.sha }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./iss-tracker/frontend
          push: true
          tags: 22i0838/iss-frontend:${{ github.sha }}

      - name: Update Kubernetes Manifests
        run: |
          sed -i "s|image: 22i0838/iss-backend:.*|image: 22i0838/iss-backend:${{ github.sha }}|g" k8s/backend.yaml
          sed -i "s|image: 22i0838/iss-frontend:.*|image: 22i0838/iss-frontend:${{ github.sha }}|g" k8s/frontend.yaml

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend.yaml k8s/frontend.yaml
          git commit -m "Update image tags to commit ${{ github.sha }}" || echo "No changes to commit"
          git push