name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./iss-tracker/backend
          push: true
          tags: 22i0838/iss-backend:${{ github.sha }}
          build-args: |
            OPENSKY_USERNAME=${{ secrets.OPENSKY_USERNAME }}
            OPENSKY_PASSWORD=${{ secrets.OPENSKY_PASSWORD }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./iss-tracker/frontend
          push: true
          tags: 22i0838/iss-frontend:${{ github.sha }}

      - name: Update Kubernetes Manifests
        run: |
          # Remove 'g' flag and be more precise with sed
          sed -i "s|image: 22i0838/iss-backend:.*|image: 22i0838/iss-backend:${{ github.sha }}|" k8s/backend.yaml
          sed -i "s|image: 22i0838/iss-frontend:.*|image: 22i0838/iss-frontend:${{ github.sha }}|" k8s/frontend.yaml
          
          echo "Backend image after update:"
          grep "image:" k8s/backend.yaml
          echo "Frontend image after update:"
          grep "image:" k8s/frontend.yaml

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend.yaml k8s/frontend.yaml
          git diff --staged --quiet || git commit -m "Update image tags to commit ${{ github.sha }}"
          git push