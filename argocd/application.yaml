apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: iss-tracker
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mahsan0838/Geospatial-App-Live-ISS-Flight-Tracker.git
    targetRevision: master
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true